name: Wekelijkse vacaturecontrole

# Controleert wekelijks (maandag) of elke vacature nog open staat,
# regenereert de detailpagina's en publiceert de wijzigingen. De .nl-site
# draait op de gh-pages-branch, dus na het bijwerken van main wordt
# gh-pages gesynct.

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vacature-sync
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Controleer vacatures
        run: python scripts/check_vacancies.py

      - name: Genereer detailpagina's
        run: python scripts/build_vacature_pages.py

      - name: Commit naar main
        run: |
          git config user.name "vacature-check"
          git config user.email "actions@github.com"
          git add jobs.html scripts/vacancy_state.json scripts/vacancy_seen.json vacatures sitemap.xml
          if git diff --cached --quiet; then
            echo "Geen wijzigingen."
            exit 0
          fi
          git commit -m "Automatische vacaturecontrole: status en detailpagina's bijgewerkt"
          pushed=false
          for i in 1 2 3 4 5; do
            if git push origin main; then
              pushed=true
              break
            fi
            echo "Push afgewezen (waarschijnlijk main verschoven), rebasen en opnieuw proberen..."
            git fetch origin main
            git rebase origin/main
            sleep $((i * 5))
          done
          if [ "$pushed" != "true" ]; then
            echo "::error::Kon niet naar main pushen na meerdere pogingen."
            exit 1
          fi

      - name: Sync gh-pages vanaf main
        run: |
          synced=false
          for i in 1 2 3 4 5; do
            git fetch origin gh-pages main
            git checkout -B gh-pages origin/gh-pages
            git archive origin/main | tar -x
            git add -A
            if git diff --cached --quiet; then
              echo "gh-pages al in sync."
              synced=true
              break
            fi
            git commit -m "sync: wekelijkse vacaturecontrole vanaf main"
            if git push origin gh-pages; then
              synced=true
              break
            fi
            echo "Push afgewezen (waarschijnlijk gh-pages verschoven elders), opnieuw proberen..."
            sleep $((i * 5))
          done
          if [ "$synced" != "true" ]; then
            echo "::error::Kon gh-pages niet synchroniseren na meerdere pogingen."
            exit 1
          fi
